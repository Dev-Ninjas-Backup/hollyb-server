<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subscription Payment Test</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f6fb;
        margin: 0;
        padding: 24px;
      }
      .container {
        max-width: 520px;
        margin: 0 auto;
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin: 0 0 16px;
        font-size: 22px;
      }
      .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 24px;
        border-bottom: 2px solid #e5e7eb;
      }
      .tab-btn {
        flex: 1;
        padding: 12px 16px;
        background: none;
        border: none;
        border-bottom: 3px solid transparent;
        cursor: pointer;
        font-weight: 600;
        color: #6b7280;
        font-size: 14px;
      }
      .tab-btn.active {
        color: #1f57e7;
        border-bottom-color: #1f57e7;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      .field {
        margin-bottom: 14px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        font-weight: 600;
      }
      input,
      select,
      button {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #d7dce8;
        border-radius: 10px;
        padding: 11px 12px;
        font-size: 14px;
      }
      #card-number,
      #card-expiry,
      #card-cvc {
        background: #fff;
        border: 1px solid #d7dce8;
        border-radius: 10px;
        padding: 11px 12px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      button {
        background: #1f57e7;
        color: #fff;
        border: none;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .result {
        margin-top: 16px;
        border-radius: 10px;
        padding: 12px;
        font-size: 13px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .ok {
        background: #e8f8ee;
        color: #166534;
      }
      .err {
        background: #fee2e2;
        color: #991b1b;
      }
      .subscription-list {
        border: 1px solid #d7dce8;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 14px;
        max-height: 200px;
        overflow-y: auto;
      }
      .subscription-item {
        display: flex;
        align-items: center;
        padding: 10px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        margin-bottom: 8px;
        cursor: pointer;
      }
      .subscription-item.expired {
        background: #fef2f2;
      }
      .subscription-item input {
        width: auto;
        margin-right: 10px;
      }
      .subscription-info {
        flex: 1;
        font-size: 13px;
      }
      .subscription-status {
        font-weight: 600;
        margin-bottom: 4px;
      }
      .subscription-status.expired {
        color: #dc2626;
      }
      .subscription-status.active {
        color: #059669;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Subscription Payment & Renewal Test</h1>

      <div class="field">
        <label for="baseUrl">API Base URL</label>
        <input id="baseUrl" value="http://localhost:5055/api/v1" />
      </div>

      <div class="field">
        <label for="token">Bearer Token</label>
        <input id="token" placeholder="eyJ..." />
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="payment">New Payment</button>
        <button class="tab-btn" data-tab="renew">Renew Subscription</button>
      </div>

      <!-- Payment Tab -->
      <div id="payment" class="tab-content active">
        <div class="field">
          <label for="planType">Plan Type</label>
          <select id="planType">
            <option value="employee_premium">employee_premium</option>
            <option value="employer_premium">employer_premium</option>
          </select>
        </div>

        <div class="field">
          <label for="cardholderName">Cardholder Name</label>
          <input id="cardholderName" value="Test User" />
        </div>

        <div class="field">
          <label>Card Number</label>
          <div id="card-number"></div>
        </div>

        <div class="row">
          <div class="field">
            <label>Expiry</label>
            <div id="card-expiry"></div>
          </div>
          <div class="field">
            <label>CVC</label>
            <div id="card-cvc"></div>
          </div>
        </div>

        <button id="payBtn">Pay & Continue</button>
        <div id="payResult" class="result" style="display: none"></div>
      </div>

      <!-- Renew Tab -->
      <div id="renew" class="tab-content">
        <div class="field">
          <label>
            <button
              id="checkSubscriptionBtn"
              style="width: auto; padding: 8px 16px; margin-bottom: 10px"
            >
              Check My Current Subscription
            </button>
          </label>
        </div>

        <div id="subscriptionStatus" style="display: none; margin-bottom: 14px">
          <div id="currentSubscriptionInfo" style="
            border: 1px solid #d7dce8;
            border-radius: 10px;
            padding: 12px;
            font-size: 13px;
          "></div>
        </div>

        <p id="subscriptionMessage" style="color: #6b7280; font-size: 13px; margin: 0">
          Click button above to check your current subscription status
        </p>

        <div id="renewCardSection" style="display: none">
          <div class="field">
            <label for="renewCardholderName">Cardholder Name</label>
            <input id="renewCardholderName" value="Test User" />
          </div>

          <div class="field">
            <label>Card Number</label>
            <div id="card-number-renew"></div>
          </div>

          <div class="row">
            <div class="field">
              <label>Expiry</label>
              <div id="card-expiry-renew"></div>
            </div>
            <div class="field">
              <label>CVC</label>
              <div id="card-cvc-renew"></div>
            </div>
          </div>

          <button id="renewBtn">Renew Subscription</button>
        </div>

        <div id="renewResult" class="result" style="display: none"></div>
      </div>
    </div>

    <script>
      const baseUrlInput = document.getElementById('baseUrl');
      const tokenInput = document.getElementById('token');
      const planTypeInput = document.getElementById('planType');
      const cardholderNameInput = document.getElementById('cardholderName');
      const payBtn = document.getElementById('payBtn');
      const payResultEl = document.getElementById('payResult');

      const tabBtns = document.querySelectorAll('.tab-btn');
      const tabContents = document.querySelectorAll('.tab-content');

      const checkSubscriptionBtn = document.getElementById('checkSubscriptionBtn');
      const subscriptionStatusEl = document.getElementById('subscriptionStatus');
      const currentSubscriptionInfoEl = document.getElementById('currentSubscriptionInfo');
      const subscriptionMessageEl = document.getElementById('subscriptionMessage');
      const renewCardSectionEl = document.getElementById('renewCardSection');
      const renewCardholderNameInput = document.getElementById('renewCardholderName');
      const renewBtn = document.getElementById('renewBtn');
      const renewResultEl = document.getElementById('renewResult');

      let stripe;
      let elements;
      let elementsRenew;
      let cardNumberElement;
      let cardExpiryElement;
      let cardCvcElement;
      let renewCardNumberElement;
      let renewCardExpiryElement;
      let renewCardCvcElement;
      let currentSubscription = null;
      let stripeInitialized = false;

      function showResult(ok, data, resultEl) {
        resultEl.style.display = 'block';
        resultEl.className = `result ${ok ? 'ok' : 'err'}`;
        resultEl.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
      }

      function switchTab(tabName, activeButton) {
        tabBtns.forEach((btn) => btn.classList.remove('active'));
        tabContents.forEach((content) => content.classList.remove('active'));

        activeButton.classList.add('active');
        document.getElementById(tabName).classList.add('active');
      }

      tabBtns.forEach((btn) => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab, btn));
      });

      async function initStripe() {
        if (stripeInitialized) return;

        const baseUrl = baseUrlInput.value.trim();
        const token = tokenInput.value.trim();

        if (!token) {
          throw new Error('Bearer token is required');
        }

        const configRes = await fetch(`${baseUrl}/subscription/payment/config`, {
          method: 'GET',
          headers: {
            Authorization: `Bearer ${token}`,
          },
        });

        const configJson = await configRes.json();

        if (!configRes.ok || !configJson?.data?.publishableKey) {
          throw new Error(configJson?.message || 'Failed to load payment config');
        }

        stripe = Stripe(configJson.data.publishableKey);

        // Create separate elements instances for each tab
        elements = stripe.elements();
        elementsRenew = stripe.elements();

        // Payment tab elements
        cardNumberElement = elements.create('cardNumber');
        cardExpiryElement = elements.create('cardExpiry');
        cardCvcElement = elements.create('cardCvc');

        cardNumberElement.mount('#card-number');
        cardExpiryElement.mount('#card-expiry');
        cardCvcElement.mount('#card-cvc');

        // Renewal tab elements (separate instance)
        renewCardNumberElement = elementsRenew.create('cardNumber');
        renewCardExpiryElement = elementsRenew.create('cardExpiry');
        renewCardCvcElement = elementsRenew.create('cardCvc');

        renewCardNumberElement.mount('#card-number-renew');
        renewCardExpiryElement.mount('#card-expiry-renew');
        renewCardCvcElement.mount('#card-cvc-renew');

        stripeInitialized = true;
      }

      checkSubscriptionBtn.addEventListener('click', async () => {
        checkSubscriptionBtn.disabled = true;
        checkSubscriptionBtn.textContent = 'Checking...';

        try {
          const baseUrl = baseUrlInput.value.trim();
          const token = tokenInput.value.trim();

          if (!token) {
            throw new Error('Bearer token is required');
          }

          currentSubscription = null;
          renewCardSectionEl.style.display = 'none';
          renewResultEl.style.display = 'none';

          const res = await fetch(`${baseUrl}/subscription/my-subscriptions/current`, {
            method: 'GET',
            headers: {
              Authorization: `Bearer ${token}`,
            },
          });

          const json = await res.json();

          if (!res.ok) {
            throw new Error(json?.message || 'Failed to load subscription');
          }

          const subscription = json?.data;

          if (!subscription || !subscription.hasSubscription) {
            subscriptionStatusEl.style.display = 'none';
            subscriptionMessageEl.textContent = 'No subscription found. Please create a new subscription first.';
            subscriptionMessageEl.style.display = 'block';
            subscriptionMessageEl.style.color = '#dc2626';
            return;
          }

          const isActive = subscription.hasActiveSubscription;
          const sub = subscription.subscription;
          const now = new Date();
          const endDate = new Date(sub.endDate);

          subscriptionStatusEl.style.display = 'block';
          subscriptionMessageEl.style.display = 'none';

          if (isActive) {
            currentSubscriptionInfoEl.innerHTML = `
              <div style="margin-bottom: 8px">
                <span style="font-weight: 600; color: #059669">● Active Subscription</span>
              </div>
              <div style="margin-bottom: 4px"><strong>Plan:</strong> ${sub.planType}</div>
              <div style="margin-bottom: 4px"><strong>Start:</strong> ${new Date(sub.startDate).toLocaleDateString()}</div>
              <div style="margin-bottom: 4px"><strong>End:</strong> ${endDate.toLocaleDateString()}</div>
              <div style="margin-top: 12px; padding: 10px; background: #fef3c7; border-radius: 8px; color: #92400e">
                Your subscription is currently active. You can only renew after it expires on ${endDate.toLocaleDateString()}.
              </div>
            `;
            renewCardSectionEl.style.display = 'none';
          } else {
            currentSubscription = {
              id: sub.id,
              planType: sub.planType,
              endDate: sub.endDate,
            };

            currentSubscriptionInfoEl.innerHTML = `
              <div style="margin-bottom: 8px">
                <span style="font-weight: 600; color: #dc2626">● Expired Subscription</span>
              </div>
              <div style="margin-bottom: 4px"><strong>Plan:</strong> ${sub.planType}</div>
              <div style="margin-bottom: 4px"><strong>Start:</strong> ${new Date(sub.startDate).toLocaleDateString()}</div>
              <div style="margin-bottom: 4px"><strong>Expired on:</strong> ${endDate.toLocaleDateString()}</div>
              <div style="margin-top: 12px; padding: 10px; background: #fee2e2; border-radius: 8px; color: #991b1b">
                This subscription has expired. Please renew below to continue using premium features.
              </div>
            `;
            renewCardSectionEl.style.display = 'block';
          }
        } catch (err) {
          subscriptionStatusEl.style.display = 'none';
          subscriptionMessageEl.textContent = err.message || 'Failed to load subscription';
          subscriptionMessageEl.style.display = 'block';
          subscriptionMessageEl.style.color = '#dc2626';
        } finally {
          checkSubscriptionBtn.disabled = false;
          checkSubscriptionBtn.textContent = 'Check My Current Subscription';
        }
      });

      payBtn.addEventListener('click', async () => {
        payBtn.disabled = true;
        showResult(false, 'Processing payment...', payResultEl);

        try {
          await initStripe();

          const baseUrl = baseUrlInput.value.trim();
          const token = tokenInput.value.trim();

          const pmResult = await stripe.createPaymentMethod({
            type: 'card',
            card: cardNumberElement,
            billing_details: {
              name: cardholderNameInput.value.trim() || 'Test User',
            },
          });

          if (pmResult.error) {
            throw new Error(pmResult.error.message || 'Failed to create payment method');
          }

          const processRes = await fetch(`${baseUrl}/subscription/payment/process`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({
              planType: planTypeInput.value,
              paymentMethodId: pmResult.paymentMethod.id,
            }),
          });

          const processJson = await processRes.json();

          if (!processRes.ok) {
            throw new Error(processJson?.message || 'Payment failed');
          }

          showResult(true, processJson, payResultEl);
        } catch (err) {
          showResult(false, err.message || 'Unexpected error', payResultEl);
        } finally {
          payBtn.disabled = false;
        }
      });

      renewBtn.addEventListener('click', async () => {
        renewBtn.disabled = true;
        showResult(false, 'Processing renewal...', renewResultEl);

        try {
          if (!currentSubscription) {
            throw new Error('Please check your subscription first');
          }

          await initStripe();

          const baseUrl = baseUrlInput.value.trim();
          const token = tokenInput.value.trim();

          const pmResult = await stripe.createPaymentMethod({
            type: 'card',
            card: renewCardNumberElement,
            billing_details: {
              name: renewCardholderNameInput.value.trim() || 'Test User',
            },
          });

          if (pmResult.error) {
            throw new Error(pmResult.error.message || 'Failed to create payment method');
          }

          const renewRes = await fetch(`${baseUrl}/subscription/renew`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({
              subscriptionId: currentSubscription.id,
              paymentMethodId: pmResult.paymentMethod.id,
            }),
          });

          const renewJson = await renewRes.json();

          if (!renewRes.ok) {
            throw new Error(renewJson?.message || 'Renewal failed');
          }

          showResult(true, renewJson, renewResultEl);
          
          // Reset and hide the card section
          currentSubscription = null;
          renewCardSectionEl.style.display = 'none';
          subscriptionStatusEl.style.display = 'none';
          subscriptionMessageEl.textContent = 'Renewal successful! Click button above to check your updated subscription.';
          subscriptionMessageEl.style.display = 'block';
          subscriptionMessageEl.style.color = '#059669';
        } catch (err) {
          showResult(false, err.message || 'Unexpected error', renewResultEl);
        } finally {
          renewBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
