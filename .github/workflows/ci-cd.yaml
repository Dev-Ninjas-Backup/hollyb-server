name: CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_PACKAGE_NAME }}:${{ secrets.PACKAGE_VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_PACKAGE_NAME }}:latest

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push # ensures it waits for the first job to finish

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy Compose File
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          source: 'compose.yaml'
          target: '/home/${{ secrets.VPS_USER }}/server'
          strip_components: 0

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}       
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60m
          command_timeout: 60m
          script: |
            cd ~/projects/hollyb-server

            docker compose --profile prod down --remove-orphans || true
            docker compose --profile prod pull
            docker compose --profile prod up -d
